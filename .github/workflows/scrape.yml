name: Scrape and deploy

on:
  schedule:
    - cron: "0 5 * * *"  # 05:00 UTC daily (07:00 Oslo sommertid / 06:00 vintertid)
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scrapers/**"
      - "run_scrapers.py"
      - "site/**"
      - ".github/workflows/scrape.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scrapers
        run: python run_scrapers.py
        continue-on-error: true

      - name: Commit updated shows.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/shows.json site/shows.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update shows.json"
            # Retry push with rebase if remote has moved (e.g. re-runs, concurrent runs)
            for i in 1 2 3; do
              if git push; then
                echo "Push succeeded"
                break
              fi
              echo "Push rejected, rebasing on latest main and retrying ($i/3)..."
              git pull --rebase origin main
            done
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
